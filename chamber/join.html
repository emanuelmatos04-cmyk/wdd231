  <header>
    <nav>
      <button id="menuButton" aria-label="Toggle navigation menu">☰</button>

  <main>
    <h1>Join the Santo Domingo Chamber of Commerce</h1>
    <p>Fill out the form below to become a member and enjoy exclusive benefits, networking opportunities, and community support.</p>

    <form id="joinForm">
      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone Number:</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="business">Business Name:</label>
      <input type="text" id="business" name="business" required>

      <label for="membership">Membership Level:</label>
      <select id="membership" name="membership" required>
        <option value="">Select a level</option>
        <option value="Bronze">Bronze</option>
        <option value="Silver">Silver</option>
        <option value="Gold">Gold</option>
      </select>

      <button type="submit" class="btn">Submit Application</button>
    </form>
  </main>

  <footer>
    <p>&copy; <span id="currentyear"></span> Emanuel Matos | WDD 231 | Santo Domingo</p>
